services:
  hermes:
    # Derived from nousresearch/hermes-agent. The derived Dockerfile installs
    # /usr/local/bin/seed-entrypoint.sh as the container ENTRYPOINT. That
    # script:
    #   1. pre-creates Hermes runtime subdirs under /opt/data
    #   2. chowns /opt/data to HERMES_UID:HERMES_HOST_GID with setgid 2775
    #      dirs / 0664 files (so the host can read+write via group bits)
    #   3. runs /opt/data/bin/entrypoint.d/*.sh hooks as root — the canonical
    #      place for downstream seeds to drop patch-re-apply scripts that
    #      would otherwise be lost on container recreate
    #   4. wraps argv with `/opt/hermes/.venv/bin/hermes` when the first arg
    #      starts with `-`, so the upstream dispatcher's `command -v "-p"`
    #      bug never fires
    #   5. gosu-drops to the image-baked hermes user
    # See ./Dockerfile + ./entrypoint/seed-entrypoint.sh for the full
    # rationale (covers Pi-substrate Issues 2, 9, 20).
    build:
      context: .
      dockerfile: Dockerfile
    image: seed-hermes/hermes-agent:local
    container_name: ${HERMES_CONTAINER_NAME:?Run ./scripts/prepare.sh before docker compose up}
    restart: unless-stopped
    working_dir: /opt/data/workspace
    # MUST start as root: seed-entrypoint.sh needs root to chown the bind
    # mount and patch /opt/hermes/* via entrypoint.d hooks. On macOS Docker
    # Desktop the previous image-USER-hermes default happened to work via
    # osxfs/VirtioFS UID translation; on Linux native it crashlooped with
    # "Permission denied" because UID 10000 can't write a bind mount the
    # host owns at mode 700. Pi-substrate Issue 2.
    user: "0:0"
    volumes:
      - ./data:/opt/data
    ports:
      - "${HERMES_API_PORT:-8642}:8642"
      - "${HERMES_DASHBOARD_PORT:-9119}:9119"
    # Command is the *argv passed to seed-entrypoint.sh*, which handles
    # privilege drop. Explicit absolute path bypasses the upstream
    # entrypoint dispatcher's `command -v` heuristic (Pi-substrate Issue
    # 20); seed-entrypoint.sh also rewrites flag-shaped argv defensively.
    command: ["/opt/hermes/.venv/bin/hermes", "gateway", "run"]
    # Host's primary GID as a supplementary group for the dropped hermes
    # user. Combined with the setgid 2775 dirs that seed-entrypoint.sh sets,
    # files Hermes creates end up group-owned by HERMES_HOST_GID and are
    # host-readable AND host-writable without sudo.
    group_add:
      - "${HERMES_HOST_GID:?Run ./scripts/prepare.sh before docker compose up}"
    environment:
      HERMES_HOME: /opt/data
      HERMES_UID: ${HERMES_UID:?Run ./scripts/prepare.sh before docker compose up}
      HERMES_GID: ${HERMES_GID:?Run ./scripts/prepare.sh before docker compose up}
      HERMES_HOST_GID: ${HERMES_HOST_GID:?Run ./scripts/prepare.sh before docker compose up}
      HERMES_DASHBOARD: "1"
      HERMES_YOLO_MODE: "1"
      GATEWAY_ALLOW_ALL_USERS: "true"
    env_file:
      - ./data/.env
