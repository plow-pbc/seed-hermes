services:
  hermes:
    # Use the upstream image directly. Its ENTRYPOINT is
    # `/init /opt/hermes/docker/main-wrapper.sh` (s6-overlay 3.2.3.0). The
    # image's stage2-hook (wired via /etc/cont-init.d/01-hermes-setup) does
    # everything we used to do in seed-entrypoint.sh:
    #   - usermod -u $HERMES_UID hermes  (UID remap so bind-mounted writes
    #                                     land at the host user's UID)
    #   - groupmod -o -g $HERMES_GID hermes
    #   - targeted chown of hermes-owned subdirs (cron, sessions, logs,
    #     hooks, memories, skills, skins, plans, workspace, home, profiles)
    #   - rootless-Podman-safe (chown failures don't abort)
    # main-wrapper.sh then drops privileges via s6-setuidgid hermes and
    # exec's the command. See the deprecated docker/entrypoint.sh shim
    # inside the image for the migration note.
    #
    # This compose deliberately does NOT set `user:`, `entrypoint:`,
    # `group_add:`, or any chown overlay. The image's stage2-hook is the
    # single source of truth for permission setup.
    image: nousresearch/hermes-agent:latest
    container_name: ${HERMES_CONTAINER_NAME:?Run ./scripts/prepare.sh before docker compose up}
    restart: unless-stopped
    working_dir: /opt/data/workspace
    volumes:
      - ./data:/opt/data
      # Bind-mount a single cont-init.d hook to install jq if missing.
      # jq is still absent from nousresearch/hermes-agent:latest as of
      # 2026-05-27, and the hostex-history-ingest scripts depend on it.
      # Mounting one file (not the directory) preserves the image's own
      # /etc/cont-init.d/* scripts (015-supervise-perms, 02-reconcile-profiles).
      # If a future image bakes jq in, delete this mount + the hook file.
      - ./cont-init.d/50-install-jq.sh:/etc/cont-init.d/50-install-jq.sh:ro
    ports:
      - "${HERMES_API_PORT:-8642}:8642"
      - "${HERMES_DASHBOARD_PORT:-9119}:9119"
    # Run the gateway, not the interactive REPL. Without this, the image's
    # main-wrapper.sh falls back to `hermes` (interactive) which exits at
    # boot in `docker compose up -d` with "Input is not a terminal (fd=0)".
    command: ["gateway", "run"]
    environment:
      # The image's stage2-hook reads HERMES_UID and HERMES_GID to remap
      # the in-container `hermes` user to match the host user, so files
      # the container writes to the bind mount land at host-owned UIDs.
      # `prepare.sh` writes these as `$(id -u)` / `$(id -g)`.
      HERMES_HOME: /opt/data
      HERMES_UID: ${HERMES_UID:?Run ./scripts/prepare.sh before docker compose up}
      HERMES_GID: ${HERMES_GID:?Run ./scripts/prepare.sh before docker compose up}
      HERMES_DASHBOARD: "1"
      # The image's dashboard run script binds to 0.0.0.0 (required so Docker
      # can port-map 9119 to the host). On a non-loopback bind its OAuth auth
      # gate fails closed unless a DashboardAuthProvider is registered — so
      # `--insecure` is opt-in via HERMES_DASHBOARD_INSECURE. Without it the
      # dashboard never opens a socket and s6 crash-loops the service. This
      # seed runs a disposable, loopback-browsed container, so we opt in.
      HERMES_DASHBOARD_INSECURE: "1"
      HERMES_YOLO_MODE: "1"
      GATEWAY_ALLOW_ALL_USERS: "true"
    env_file:
      - ./data/.env
