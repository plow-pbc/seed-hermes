services:
  hermes:
    image: nousresearch/hermes-agent
    container_name: ${HERMES_CONTAINER_NAME:?Run ./scripts/prepare.sh before docker compose up}
    restart: unless-stopped
    working_dir: /opt/data/workspace
    volumes:
      - ./data:/opt/data
    ports:
      - "${HERMES_API_PORT:-8642}:8642"
      - "${HERMES_DASHBOARD_PORT:-9119}:9119"
    # Wrap `gateway run` so `hermes` is on the login-shell PATH for
    # downstream seeds that drive the container via `docker exec ... bash -lc`
    # (e.g. seed-hermes-airbnb-manager's courier sidecar, the gbrain
    # installer). The image installs the binary at /opt/hermes/.venv/bin/hermes;
    # without the symlink, `bash -lc 'hermes ...'` fails with command not found.
    command: >
      bash -c "ln -sf /opt/hermes/.venv/bin/hermes /usr/local/bin/hermes && exec /opt/hermes/.venv/bin/hermes gateway run"
    environment:
      HERMES_HOME: /opt/data
      HERMES_UID: ${HERMES_UID:?Run ./scripts/prepare.sh before docker compose up}
      HERMES_GID: ${HERMES_GID:?Run ./scripts/prepare.sh before docker compose up}
      HERMES_DASHBOARD: "1"
      HERMES_YOLO_MODE: "1"
      GATEWAY_ALLOW_ALL_USERS: "true"
    env_file:
      - ./data/.env
